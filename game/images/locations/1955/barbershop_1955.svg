    <path d="M128,440 L152,420 L152,445 L128,465 Z" fill="#2A4A8A" stroke="none" opacity="0.7"/>
    <path d="M128,480 L152,460 L152,485 L128,505 Z" fill="#2A4A8A" stroke="none" opacity="0.7"/>
    <path d="M128,520 L152,500 L152,525 L128,545 Z" fill="#2A4A8A" stroke="none" opacity="0.7"/>
    <path d="M128,560 L152,540 L152,565 L128,585 Z" fill="#2A4A8A" stroke="none" opacity="0.7"/>
    <path d="M128,600 L152,580 L152,605 L128,625 Z" fill="#2A4A8A" stroke="none" opacity="0.7"/>
    <path d="M128,640 L152,620 L152,645 L128,665 Z" fill="#2A4A8A" stroke="none" opacity="0.7"/>
