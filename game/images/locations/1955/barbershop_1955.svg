    <rect x="1400" y="600" width="120" height="82" rx="5" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="1435" y1="608" x2="1435" y2="678" stroke-width="1.5"/>
    <line x1="1480" y1="608" x2="1480" y2="678" stroke-width="1.5"/>
