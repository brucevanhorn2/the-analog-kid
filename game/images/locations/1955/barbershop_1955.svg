    <rect x="1720" y="600" width="80" height="82" rx="5" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="1748" y1="608" x2="1748" y2="678" stroke-width="1.5"/>
    <line x1="1776" y1="608" x2="1776" y2="678" stroke-width="1.5"/>
