    <rect x="1560" y="600" width="120" height="82" rx="5" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="1595" y1="608" x2="1595" y2="678" stroke-width="1.5"/>
    <line x1="1640" y1="608" x2="1640" y2="678" stroke-width="1.5"/>
    <line x1="1568" y1="800" x2="1565" y2="855" stroke-linecap="round"/>
