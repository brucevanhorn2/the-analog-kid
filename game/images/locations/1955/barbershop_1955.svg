    <path d="M430,558 Q444,543 458,558"/>
    <rect x="470" y="562" width="22" height="46" rx="4"/>
    <path d="M470,562 Q481,550 492,562"/>
    <rect x="504" y="554" width="32" height="54" rx="5"/>
    <path d="M504,554 Q520,537 536,554"/>
    <rect x="548" y="560" width="24" height="48" rx="4"/>
    <path d="M548,560 Q560,547 572,560"/>
    <rect x="585" y="556" width="28" height="52" rx="5"/>
    <path d="M585,556 Q599,541 613,556"/>
    <rect x="625" y="563" width="20" height="45" rx="3"/>
    <path d="M625,563 Q635,553 645,563"/>
    <!-- Taller bottle -->
