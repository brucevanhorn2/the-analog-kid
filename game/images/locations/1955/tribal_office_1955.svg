  <!-- METAL DESK -->
  <rect x="700" y="620" width="620" height="240" fill="#C4C0B0" stroke="#1a1a1a" stroke-width="2.5" rx="2"/>
  <line x1="700" y1="620" x2="1320" y2="620" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Desk surface overhang -->
  <rect x="695" y="588" width="630" height="36" rx="2" fill="#CCCAB8" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Papers on desk -->
  <rect x="720" y="555" width="200" height="160" rx="2" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-3, 820, 635)"/>
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.4" transform="rotate(-3, 820, 635)">
    <line x1="735" y1="575" x2="905" y2="575"/>
    <line x1="735" y1="590" x2="895" y2="590"/>
    <line x1="735" y1="605" x2="900" y2="605"/>
    <line x1="735" y1="620" x2="888" y2="620"/>
    <line x1="735" y1="635" x2="898" y2="635"/>
    <line x1="735" y1="650" x2="892" y2="650"/>
    <line x1="735" y1="665" x2="900" y2="665"/>
    <line x1="735" y1="680" x2="886" y2="680"/>
    <line x1="735" y1="695" x2="894" y2="695"/>
  </g>
  <rect x="940" y="562" width="140" height="100" rx="2" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(2, 1010, 612)"/>
  <!-- Small lamp on desk -->
  <line x1="1200" y1="590" x2="1200" y2="500" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M1175,500 Q1200,480 1225,500" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="1200" cy="505" r="6" fill="#E8E0C8"/>
  <!-- Desk drawers -->
  <rect x="710" y="630" width="160" height="100" rx="1" fill="#BCBAA8" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="730" y="668" width="48" height="8" rx="2" fill="#ACA8A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="880" y="630" width="160" height="100" rx="1" fill="#BCBAA8" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="900" y="668" width="48" height="8" rx="2" fill="#ACA8A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Desk legs -->
  <line x1="705" y1="860" x2="705" y2="960" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="1315" y1="860" x2="1315" y2="960" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- FILING CABINET — back wall right of window -->
  <rect x="1240" y="470" width="170" height="390" fill="#C4C0B0" stroke="#1a1a1a" stroke-width="2.5" rx="2"/>
  <rect x="1250" y="480" width="150" height="112" rx="2" fill="#CCC8B8" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1295" y="526" width="44" height="8" rx="2" fill="#B4B0A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="1250" y="602" width="150" height="112" rx="2" fill="#CCC8B8" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1295" y="648" width="44" height="8" rx="2" fill="#B4B0A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="1250" y="724" width="150" height="112" rx="2" fill="#CCC8B8" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1295" y="770" width="44" height="8" rx="2" fill="#B4B0A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Cabinet top -->
  <rect x="1235" y="460" width="180" height="16" fill="#B8B4A4" stroke="#1a1a1a" stroke-width="2"/>

  <!-- FOLDING METAL CHAIRS — waiting area -->
  <!-- Chair 1 -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="150" y="650" width="100" height="120" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="150" y="580" width="100" height="72" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Chair slats on back -->
    <line x1="185" y1="588" x2="185" y2="648" stroke-width="1.5"/>
    <line x1="215" y1="588" x2="215" y2="648" stroke-width="1.5"/>
    <!-- Legs -->
    <line x1="158" y1="770" x2="152" y2="840" stroke-linecap="round"/>
    <line x1="242" y1="770" x2="248" y2="840" stroke-linecap="round"/>
    <line x1="158" y1="770" x2="248" y2="770" stroke-linecap="round"/>
  </g>
  <!-- Chair 2 -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="295" y="650" width="100" height="120" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="295" y="580" width="100" height="72" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="330" y1="588" x2="330" y2="648" stroke-width="1.5"/>
    <line x1="360" y1="588" x2="360" y2="648" stroke-width="1.5"/>
    <line x1="303" y1="770" x2="297" y2="840" stroke-linecap="round"/>
    <line x1="387" y1="770" x2="393" y2="840" stroke-linecap="round"/>
    <line x1="303" y1="770" x2="387" y2="770" stroke-linecap="round"/>
  </g>
  <!-- Chair 3 -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="440" y="650" width="100" height="120" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="440" y="580" width="100" height="72" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="475" y1="588" x2="475" y2="648" stroke-width="1.5"/>
    <line x1="505" y1="588" x2="505" y2="648" stroke-width="1.5"/>
    <line x1="448" y1="770" x2="442" y2="840" stroke-linecap="round"/>
    <line x1="532" y1="770" x2="538" y2="840" stroke-linecap="round"/>
    <line x1="448" y1="770" x2="532" y2="770" stroke-linecap="round"/>
  </g>
  <!-- Chair 4 (empty) -->
  <g stroke="#1a1a1a" stroke-width="2">
    <rect x="585" y="650" width="100" height="120" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <rect x="585" y="580" width="100" height="72" rx="3" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="620" y1="588" x2="620" y2="648" stroke-width="1.5"/>
    <line x1="650" y1="588" x2="650" y2="648" stroke-width="1.5"/>
    <line x1="593" y1="770" x2="587" y2="840" stroke-linecap="round"/>
    <line x1="677" y1="770" x2="683" y2="840" stroke-linecap="round"/>
    <line x1="593" y1="770" x2="677" y2="770" stroke-linecap="round"/>
  </g>
</svg>
