<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#F5F0E8"/>

  <!-- Back wall -->
  <rect x="100" y="80" width="1720" height="760" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>
  <!-- Floor line -->
  <line x1="100" y1="840" x2="1820" y2="840" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Left wall -->
  <line x1="100" y1="80" x2="100" y2="840" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Right wall -->
  <line x1="1820" y1="80" x2="1820" y2="840" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Ceiling -->
  <line x1="100" y1="80" x2="1820" y2="80" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Raised platform / chancel at far end -->
  <rect x="700" y="680" width="520" height="160" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Platform steps -->
  <rect x="720" y="700" width="480" height="140" fill="#E8E3D6" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="740" y="720" width="440" height="120" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Step riser lines -->
  <line x1="700" y1="700" x2="1220" y2="700" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="720" y1="720" x2="1200" y2="720" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Pulpit / lectern on platform -->
  <rect x="885" y="610" width="150" height="210" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="900" y="590" width="120" height="40" rx="3" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Lectern face detail -->
  <line x1="900" y1="640" x2="1020" y2="640" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M910,650 L960,640 L1010,650" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Cross on back wall -->
  <!-- Vertical beam -->
  <rect x="935" y="120" width="50" height="280" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Horizontal beam -->
  <rect x="840" y="220" width="240" height="44" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Arched windows — left wall -->
  <!-- Window 1 left -->
  <g stroke="#1a1a1a" stroke-width="2.5" fill="none">
    <rect x="140" y="260" width="120" height="320" rx="0"/>
    <path d="M140,260 Q200,190 260,260" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="140" y="260" width="120" height="320" fill="#E8E8DC" stroke="#1a1a1a" stroke-width="2"/>
    <!-- Light rays through window -->
    <line x1="200" y1="270" x2="200" y2="580" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="12,8" opacity="0.4"/>
    <line x1="165" y1="280" x2="145" y2="580" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="10,8" opacity="0.3"/>
    <line x1="235" y1="280" x2="255" y2="580" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="10,8" opacity="0.3"/>
  </g>
  <!-- Window 2 left -->
  <g stroke="#1a1a1a" stroke-width="2.5" fill="none">
    <rect x="140" y="200" width="120" height="400" fill="#E8E8DC"/>
    <path d="M140,200 Q200,130 260,200" fill="#E8E8DC" stroke="#1a1a1a" stroke-width="2.5"/>
    <rect x="152" y="212" width="96" height="380" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <!-- Window 3 left (different height) -->
  <g>
    <rect x="140" y="200" width="120" height="400" fill="#EDEAD8" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M140,200 Q200,130 260,200" fill="#EDEAD8" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>

  <!-- Arched windows — right wall -->
  <g>
    <rect x="1660" y="200" width="120" height="400" fill="#EDEAD8" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M1660,200 Q1720,130 1780,200" fill="#EDEAD8" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>
  <!-- Second right window -->
  <g>
    <rect x="1480" y="200" width="120" height="400" fill="#EDEAD8" stroke="#1a1a1a" stroke-width="2.5"/>
    <path d="M1480,200 Q1540,130 1600,200" fill="#EDEAD8" stroke="#1a1a1a" stroke-width="2.5"/>
  </g>

  <!-- CENTER AISLE -->
  <line x1="960" y1="840" x2="960" y2="580" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="20,10" opacity="0.35"/>

  <!-- PEWS — left bank -->
  <!-- Pew 1 left -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="300" y="730" width="580" height="55" rx="3"/>
    <rect x="300" y="690" width="580" height="42" rx="3"/>
    <line x1="300" y1="690" x2="880" y2="690" stroke-width="2.5"/>
  </g>
  <!-- Pew 2 left -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="300" y="614" width="580" height="55" rx="3"/>
    <rect x="300" y="574" width="580" height="42" rx="3"/>
    <line x1="300" y1="574" x2="880" y2="574" stroke-width="2.5"/>
  </g>
  <!-- Pew 3 left -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="300" y="500" width="580" height="55" rx="3"/>
    <rect x="300" y="460" width="580" height="42" rx="3"/>
    <line x1="300" y1="460" x2="880" y2="460" stroke-width="2.5"/>
  </g>
  <!-- Pew 4 left (back) -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="300" y="386" width="580" height="55" rx="3"/>
    <rect x="300" y="346" width="580" height="42" rx="3"/>
    <line x1="300" y1="346" x2="880" y2="346" stroke-width="2.5"/>
  </g>

  <!-- PEWS — right bank -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="1040" y="730" width="580" height="55" rx="3"/>
    <rect x="1040" y="690" width="580" height="42" rx="3"/>
    <line x1="1040" y1="690" x2="1620" y2="690" stroke-width="2.5"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="1040" y="614" width="580" height="55" rx="3"/>
    <rect x="1040" y="574" width="580" height="42" rx="3"/>
    <line x1="1040" y1="574" x2="1620" y2="574" stroke-width="2.5"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="1040" y="500" width="580" height="55" rx="3"/>
    <rect x="1040" y="460" width="580" height="42" rx="3"/>
    <line x1="1040" y1="460" x2="1620" y2="460" stroke-width="2.5"/>
  </g>
  <g stroke="#1a1a1a" stroke-width="2" fill="#E0DAC8">
    <rect x="1040" y="386" width="580" height="55" rx="3"/>
    <rect x="1040" y="346" width="580" height="42" rx="3"/>
    <line x1="1040" y1="346" x2="1620" y2="346" stroke-width="2.5"/>
  </g>

  <!-- Hanging lights overhead -->
  <g stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
    <line x1="480" y1="80" x2="480" y2="160"/>
    <ellipse cx="480" cy="175" rx="30" ry="16" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>

    <line x1="960" y1="80" x2="960" y2="160"/>
    <ellipse cx="960" cy="175" rx="30" ry="16" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>

    <line x1="1440" y1="80" x2="1440" y2="160"/>
    <ellipse cx="1440" cy="175" rx="30" ry="16" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>

    <line x1="720" y1="80" x2="720" y2="145"/>
    <ellipse cx="720" cy="158" rx="22" ry="12" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5"/>

    <line x1="1200" y1="80" x2="1200" y2="145"/>
    <ellipse cx="1200" cy="158" rx="22" ry="12" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>
