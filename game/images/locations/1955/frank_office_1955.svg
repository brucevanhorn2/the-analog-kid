<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#F5F0E8"/>

  <!-- Room walls -->
  <line x1="130" y1="100" x2="1790" y2="100" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="100" x2="130" y2="840" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="1790" y1="100" x2="1790" y2="840" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="840" x2="1790" y2="840" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Linoleum floor — subtle grid, slightly worn -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.18">
    <line x1="130" y1="880" x2="1790" y2="880"/>
    <line x1="130" y1="920" x2="1790" y2="920"/>
    <line x1="130" y1="960" x2="1790" y2="960"/>
    <line x1="130" y1="1000" x2="1790" y2="1000"/>
    <line x1="130" y1="1040" x2="1790" y2="1040"/>
    <line x1="250" y1="840" x2="250" y2="1080"/>
    <line x1="370" y1="840" x2="370" y2="1080"/>
    <line x1="490" y1="840" x2="490" y2="1080"/>
    <line x1="610" y1="840" x2="610" y2="1080"/>
    <line x1="730" y1="840" x2="730" y2="1080"/>
    <line x1="850" y1="840" x2="850" y2="1080"/>
    <line x1="970" y1="840" x2="970" y2="1080"/>
    <line x1="1090" y1="840" x2="1090" y2="1080"/>
    <line x1="1210" y1="840" x2="1210" y2="1080"/>
    <line x1="1330" y1="840" x2="1330" y2="1080"/>
    <line x1="1450" y1="840" x2="1450" y2="1080"/>
    <line x1="1570" y1="840" x2="1570" y2="1080"/>
    <line x1="1690" y1="840" x2="1690" y2="1080"/>
  </g>
  <!-- A worn patch in linoleum — slight discoloration -->
  <ellipse cx="960" cy="900" rx="180" ry="40" fill="#E8E3D6" stroke="none" opacity="0.5"/>

  <!-- WINDOW with venetian blinds, right wall -->
  <rect x="1450" y="150" width="280" height="380" fill="#D8E0E8" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Window frame -->
  <rect x="1460" y="160" width="260" height="360" fill="#E0E8EF" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Venetian blind slats — partly open, some angled -->
  <g stroke="#1a1a1a" stroke-width="1.5" opacity="0.7">
    <line x1="1462" y1="178" x2="1718" y2="174"/>
    <line x1="1462" y1="194" x2="1718" y2="190"/>
    <line x1="1462" y1="210" x2="1718" y2="206"/>
    <line x1="1462" y1="226" x2="1718" y2="222"/>
    <line x1="1462" y1="242" x2="1718" y2="238"/>
    <line x1="1462" y1="258" x2="1718" y2="254"/>
    <line x1="1462" y1="274" x2="1718" y2="270"/>
    <line x1="1462" y1="290" x2="1718" y2="286"/>
    <line x1="1462" y1="306" x2="1718" y2="302"/>
    <line x1="1462" y1="322" x2="1718" y2="318"/>
    <line x1="1462" y1="338" x2="1718" y2="334"/>
    <line x1="1462" y1="354" x2="1718" y2="350"/>
    <line x1="1462" y1="370" x2="1718" y2="366"/>
    <line x1="1462" y1="386" x2="1718" y2="382"/>
    <line x1="1462" y1="402" x2="1718" y2="398"/>
    <line x1="1462" y1="418" x2="1718" y2="414"/>
    <line x1="1462" y1="434" x2="1718" y2="430"/>
    <line x1="1462" y1="450" x2="1718" y2="446"/>
    <line x1="1462" y1="466" x2="1718" y2="462"/>
    <line x1="1462" y1="482" x2="1718" y2="478"/>
    <line x1="1462" y1="498" x2="1718" y2="494"/>
    <line x1="1462" y1="508" x2="1718" y2="506"/>
  </g>
  <!-- Light bar gap showing street outside — one open band -->
  <rect x="1462" y="290" width="256" height="20" fill="#EAF0F5" opacity="0.8"/>
  <!-- Blind pull cord -->
  <line x1="1590" y1="165" x2="1590" y2="525" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Window sill -->
  <rect x="1440" y="526" width="320" height="18" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Diagonal light bar on floor from blind gap -->
  <path d="M1462,310 L1790,420 L1790,440 L1462,330 Z" fill="#F0EBE0" opacity="0.3"/>

  <!-- FILING CABINET — 3 drawer, left wall -->
  <rect x="150" y="450" width="180" height="390" fill="#D0CEC0" stroke="#1a1a1a" stroke-width="2.5" rx="2"/>
  <!-- Drawer 1 -->
  <rect x="158" y="460" width="164" height="115" rx="2" fill="#D8D4C4" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Drawer handle 1 -->
  <rect x="218" y="510" width="44" height="8" rx="2" fill="#C0BDB0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Drawer 2 -->
  <rect x="158" y="585" width="164" height="115" rx="2" fill="#D8D4C4" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="218" y="635" width="44" height="8" rx="2" fill="#C0BDB0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Drawer 3 -->
  <rect x="158" y="710" width="164" height="115" rx="2" fill="#D8D4C4" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="218" y="760" width="44" height="8" rx="2" fill="#C0BDB0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Cabinet top -->
  <rect x="148" y="442" width="190" height="16" rx="1" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Papers sticking out of top drawer (slightly open) -->
  <rect x="165" y="445" width="140" height="16" rx="1" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="175" y1="450" x2="295" y2="450" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>

  <!-- BULLETIN BOARD — back wall, center-right -->
  <rect x="700" y="130" width="620" height="420" fill="#C8B898" stroke="#1a1a1a" stroke-width="3" rx="3"/>
  <!-- Board frame -->
  <rect x="708" y="138" width="604" height="404" fill="#D4C4A0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Pinned papers — various rectangles at angles -->
  <rect x="730" y="155" width="140" height="100" rx="2" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-3, 800, 205)"/>
  <line x1="740" y1="175" x2="860" y2="175" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="740" y1="186" x2="850" y2="186" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="740" y1="197" x2="860" y2="197" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <!-- Pin dot -->
  <circle cx="800" cy="158" r="4" fill="#1a1a1a"/>

  <rect x="900" y="148" width="120" height="160" rx="2" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(2, 960, 228)"/>
  <line x1="910" y1="168" x2="1010" y2="168" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="910" y1="180" x2="1010" y2="180" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="910" y1="192" x2="1010" y2="192" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="910" y1="204" x2="1005" y2="204" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="910" y1="216" x2="1010" y2="216" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="910" y1="228" x2="1002" y2="228" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <line x1="910" y1="240" x2="1008" y2="240" stroke="#1a1a1a" stroke-width="1" opacity="0.5"/>
  <circle cx="960" cy="150" r="4" fill="#1a1a1a"/>

  <rect x="1060" y="155" width="180" height="130" rx="2" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-2, 1150, 220)"/>
  <circle cx="1150" cy="157" r="4" fill="#1a1a1a"/>

  <rect x="720" y="285" width="160" height="110" rx="2" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(4, 800, 340)"/>
  <circle cx="800" cy="287" r="4" fill="#1a1a1a"/>

  <rect x="920" y="340" width="200" height="140" rx="2" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(-3, 1020, 410)"/>
  <circle cx="1020" cy="343" r="4" fill="#1a1a1a"/>

  <!-- Map/diagram pinned up -->
  <rect x="1120" y="300" width="160" height="220" rx="2" fill="#E8E0D0" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(2, 1200, 410)"/>
  <path d="M1135,340 Q1175,320 1215,360 Q1250,340 1265,380 Q1230,410 1200,400 Q1170,430 1140,410 Z" fill="none" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <circle cx="1200" cy="302" r="4" fill="#1a1a1a"/>

  <!-- String connecting pins — investigation board feel -->
  <line x1="800" y1="160" x2="960" y2="152" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="960" y1="152" x2="1150" y2="159" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <line x1="800" y1="290" x2="1020" y2="345" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- METAL DESK -->
  <rect x="500" y="660" width="800" height="180" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2.5" rx="2"/>
  <!-- Desk edge highlight -->
  <line x1="500" y1="660" x2="1300" y2="660" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Desk surface -->
  <rect x="500" y="620" width="800" height="42" rx="2" fill="#D0CCBC" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Open case file on desk -->
  <rect x="560" y="580" width="340" height="240" rx="2" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="2" transform="rotate(-2, 730, 700)"/>
  <!-- Left page -->
  <rect x="564" y="584" width="158" height="230" rx="1" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Right page -->
  <rect x="726" y="582" width="168" height="232" rx="1" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Case file text lines -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.5">
    <line x1="574" y1="610" x2="712" y2="610"/>
    <line x1="574" y1="622" x2="700" y2="622"/>
    <line x1="574" y1="634" x2="708" y2="634"/>
    <line x1="574" y1="646" x2="702" y2="646"/>
    <line x1="574" y1="658" x2="710" y2="658"/>
    <line x1="574" y1="670" x2="696" y2="670"/>
    <line x1="574" y1="682" x2="706" y2="682"/>
    <line x1="574" y1="694" x2="700" y2="694"/>
    <line x1="574" y1="706" x2="710" y2="706"/>
    <line x1="574" y1="718" x2="698" y2="718"/>
    <!-- Right page -->
    <line x1="736" y1="610" x2="882" y2="610"/>
    <line x1="736" y1="622" x2="870" y2="622"/>
    <line x1="736" y1="634" x2="878" y2="634"/>
  </g>
  <!-- Photograph stapled in case — small rectangle top right of right page -->
  <rect x="830" y="588" width="55" height="70" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="840" y1="610" x2="876" y2="610" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>

  <!-- Ashtray on desk corner -->
  <ellipse cx="1180" cy="660" rx="32" ry="18" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Cigarette butt in ashtray -->
  <line x1="1162" y1="658" x2="1190" y2="655" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Desk drawers -->
  <rect x="510" y="668" width="175" height="85" rx="1" fill="#C4C0B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="525" y="700" width="50" height="10" rx="2" fill="#B8B4A4" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="700" y="668" width="175" height="85" rx="1" fill="#C4C0B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="762" y="700" width="50" height="10" rx="2" fill="#B8B4A4" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Desk legs -->
  <line x1="510" y1="840" x2="510" y2="960" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="1290" y1="840" x2="1290" y2="960" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="540" y1="840" x2="540" y2="940" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="1260" y1="840" x2="1260" y2="940" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- OVERHEAD LIGHT — functional single fixture -->
  <line x1="960" y1="100" x2="960" y2="165" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <rect x="900" y="165" width="120" height="28" rx="4" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Light fixture shade -->
  <path d="M892,165 Q960,155 1028,165" fill="#C8C4B4" stroke="#1a1a1a" stroke-width="2"/>
</svg>
