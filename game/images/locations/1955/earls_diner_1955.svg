<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#F5F0E8"/>

  <!-- Back wall -->
  <rect x="120" y="120" width="1680" height="680" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="3" stroke-linejoin="round"/>

  <!-- Floor line -->
  <line x1="120" y1="800" x2="1800" y2="800" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Left wall (perspective) -->
  <line x1="120" y1="120" x2="120" y2="800" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Right wall (perspective) -->
  <line x1="1800" y1="120" x2="1800" y2="800" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Ceiling -->
  <line x1="120" y1="120" x2="1800" y2="120" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Checkered floor tiles -->
  <g stroke="#1a1a1a" stroke-width="1" opacity="0.5">
    <!-- Horizontal tile lines -->
    <line x1="120" y1="820" x2="1800" y2="820" stroke-width="1"/>
    <line x1="120" y1="840" x2="1800" y2="840" stroke-width="1"/>
    <line x1="120" y1="860" x2="1800" y2="860" stroke-width="1"/>
    <line x1="120" y1="880" x2="1800" y2="880" stroke-width="1"/>
    <line x1="120" y1="900" x2="1800" y2="900" stroke-width="1"/>
    <line x1="120" y1="920" x2="1800" y2="920" stroke-width="1"/>
    <line x1="120" y1="940" x2="1800" y2="940" stroke-width="1"/>
    <line x1="120" y1="960" x2="1800" y2="960" stroke-width="1"/>
    <line x1="120" y1="980" x2="1800" y2="980" stroke-width="1"/>
    <!-- Vertical tile lines -->
    <line x1="200" y1="800" x2="200" y2="1080" stroke-width="1"/>
    <line x1="280" y1="800" x2="280" y2="1080" stroke-width="1"/>
    <line x1="360" y1="800" x2="360" y2="1080" stroke-width="1"/>
    <line x1="440" y1="800" x2="440" y2="1080" stroke-width="1"/>
    <line x1="520" y1="800" x2="520" y2="1080" stroke-width="1"/>
    <line x1="600" y1="800" x2="600" y2="1080" stroke-width="1"/>
    <line x1="680" y1="800" x2="680" y2="1080" stroke-width="1"/>
    <line x1="760" y1="800" x2="760" y2="1080" stroke-width="1"/>
    <line x1="840" y1="800" x2="840" y2="1080" stroke-width="1"/>
    <line x1="920" y1="800" x2="920" y2="1080" stroke-width="1"/>
    <line x1="1000" y1="800" x2="1000" y2="1080" stroke-width="1"/>
    <line x1="1080" y1="800" x2="1080" y2="1080" stroke-width="1"/>
    <line x1="1160" y1="800" x2="1160" y2="1080" stroke-width="1"/>
    <line x1="1240" y1="800" x2="1240" y2="1080" stroke-width="1"/>
    <line x1="1320" y1="800" x2="1320" y2="1080" stroke-width="1"/>
    <line x1="1400" y1="800" x2="1400" y2="1080" stroke-width="1"/>
    <line x1="1480" y1="800" x2="1480" y2="1080" stroke-width="1"/>
    <line x1="1560" y1="800" x2="1560" y2="1080" stroke-width="1"/>
    <line x1="1640" y1="800" x2="1640" y2="1080" stroke-width="1"/>
    <line x1="1720" y1="800" x2="1720" y2="1080" stroke-width="1"/>
  </g>
  <!-- Checkerboard fill — alternate dark squares -->
  <g fill="#1a1a1a" opacity="0.12">
    <rect x="120" y="800" width="80" height="20"/>
    <rect x="280" y="800" width="80" height="20"/>
    <rect x="440" y="800" width="80" height="20"/>
    <rect x="600" y="800" width="80" height="20"/>
    <rect x="760" y="800" width="80" height="20"/>
    <rect x="920" y="800" width="80" height="20"/>
    <rect x="1080" y="800" width="80" height="20"/>
    <rect x="1240" y="800" width="80" height="20"/>
    <rect x="1400" y="800" width="80" height="20"/>
    <rect x="1560" y="800" width="80" height="20"/>
    <rect x="1720" y="800" width="80" height="20"/>

    <rect x="200" y="820" width="80" height="20"/>
    <rect x="360" y="820" width="80" height="20"/>
    <rect x="520" y="820" width="80" height="20"/>
    <rect x="680" y="820" width="80" height="20"/>
    <rect x="840" y="820" width="80" height="20"/>
    <rect x="1000" y="820" width="80" height="20"/>
    <rect x="1160" y="820" width="80" height="20"/>
    <rect x="1320" y="820" width="80" height="20"/>
    <rect x="1480" y="820" width="80" height="20"/>
    <rect x="1640" y="820" width="80" height="20"/>

    <rect x="120" y="840" width="80" height="20"/>
    <rect x="280" y="840" width="80" height="20"/>
    <rect x="440" y="840" width="80" height="20"/>
    <rect x="600" y="840" width="80" height="20"/>
    <rect x="760" y="840" width="80" height="20"/>
    <rect x="920" y="840" width="80" height="20"/>
    <rect x="1080" y="840" width="80" height="20"/>
    <rect x="1240" y="840" width="80" height="20"/>
    <rect x="1400" y="840" width="80" height="20"/>
    <rect x="1560" y="840" width="80" height="20"/>
    <rect x="1720" y="840" width="80" height="20"/>

    <rect x="200" y="860" width="80" height="20"/>
    <rect x="360" y="860" width="80" height="20"/>
    <rect x="520" y="860" width="80" height="20"/>
    <rect x="680" y="860" width="80" height="20"/>
    <rect x="840" y="860" width="80" height="20"/>
    <rect x="1000" y="860" width="80" height="20"/>
    <rect x="1160" y="860" width="80" height="20"/>
    <rect x="1320" y="860" width="80" height="20"/>
    <rect x="1480" y="860" width="80" height="20"/>
    <rect x="1640" y="860" width="80" height="20"/>

    <rect x="120" y="880" width="80" height="20"/>
    <rect x="280" y="880" width="80" height="20"/>
    <rect x="440" y="880" width="80" height="20"/>
    <rect x="600" y="880" width="80" height="20"/>
    <rect x="760" y="880" width="80" height="20"/>
    <rect x="920" y="880" width="80" height="20"/>
    <rect x="1080" y="880" width="80" height="20"/>
    <rect x="1240" y="880" width="80" height="20"/>
    <rect x="1400" y="880" width="80" height="20"/>
    <rect x="1560" y="880" width="80" height="20"/>
    <rect x="1720" y="880" width="80" height="20"/>
  </g>

  <!-- COUNTER — left side, running front-to-back -->
  <!-- Counter top surface -->
  <rect x="120" y="520" width="380" height="280" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Counter face -->
  <rect x="120" y="600" width="380" height="200" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Counter top surface highlight -->
  <line x1="120" y1="520" x2="500" y2="520" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Counter stools -->
  <g stroke="#1a1a1a" stroke-width="2" fill="#1a1a1a" fill-opacity="0.08">
    <!-- Stool 1 -->
    <circle cx="175" cy="810" r="28" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="175" y1="782" x2="175" y2="800" stroke-width="2.5"/>
    <!-- Stool 2 -->
    <circle cx="255" cy="810" r="28" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="255" y1="782" x2="255" y2="800" stroke-width="2.5"/>
    <!-- Stool 3 -->
    <circle cx="335" cy="810" r="28" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="335" y1="782" x2="335" y2="800" stroke-width="2.5"/>
    <!-- Stool 4 -->
    <circle cx="415" cy="810" r="28" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="415" y1="782" x2="415" y2="800" stroke-width="2.5"/>
  </g>

  <!-- Shelf behind counter -->
  <rect x="120" y="350" width="380" height="18" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Radio on shelf -->
  <rect x="220" y="290" width="90" height="58" rx="4" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="228" y="297" width="55" height="35" rx="2" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="300" cy="318" r="8" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Radio dial lines -->
  <line x1="233" y1="305" x2="278" y2="305" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="233" y1="312" x2="278" y2="312" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="233" y1="319" x2="278" y2="319" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Small items on shelf -->
  <rect x="150" y="316" width="24" height="32" rx="2" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="180" y="320" width="18" height="28" rx="2" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="340" y="312" width="22" height="36" rx="2" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="368" y="318" width="16" height="30" rx="2" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Pass-through window to kitchen -->
  <rect x="570" y="200" width="280" height="200" fill="#E8E3D6" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="580" y="210" width="260" height="180" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Window sill -->
  <rect x="560" y="395" width="300" height="18" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Kitchen suggestion through window — hot plate, shelves -->
  <line x1="590" y1="340" x2="830" y2="340" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="8,4"/>
  <rect x="610" y="250" width="60" height="45" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="700" y="255" width="50" height="40" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Segregation sign on back wall -->
  <rect x="920" y="165" width="200" height="90" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Sign text implied with lines -->
  <line x1="940" y1="190" x2="1100" y2="190" stroke="#1a1a1a" stroke-width="3"/>
  <line x1="940" y1="207" x2="1100" y2="207" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="940" y1="221" x2="1060" y2="221" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="940" y1="235" x2="1080" y2="235" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Arrow shape on sign -->
  <line x1="1060" y1="225" x2="1100" y2="225" stroke="#1a1a1a" stroke-width="2"/>
  <polyline points="1090,218 1100,225 1090,232" fill="none" stroke="#1a1a1a" stroke-width="2"/>

  <!-- BOOTHS — right side -->
  <!-- Booth 1 -->
  <rect x="1380" y="250" width="320" height="120" rx="6" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Table surface -->
  <rect x="1440" y="330" width="200" height="60" rx="3" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Booth seat top edge -->
  <line x1="1390" y1="260" x2="1690" y2="260" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Booth back divider -->
  <rect x="1380" y="370" width="320" height="12" rx="2" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Second seat of booth -->
  <rect x="1380" y="382" width="320" height="90" rx="6" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Booth 2 -->
  <rect x="1380" y="500" width="320" height="120" rx="6" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="1440" y="580" width="200" height="60" rx="3" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="1390" y1="510" x2="1690" y2="510" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <rect x="1380" y="620" width="320" height="12" rx="2" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="1380" y="632" width="320" height="90" rx="6" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Booth 3 -->
  <rect x="1380" y="752" width="320" height="48" rx="6" fill="#E0DAC8" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="1440" y="760" width="200" height="30" rx="3" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Overhead hanging lights -->
  <line x1="500" y1="120" x2="500" y2="190" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M472,190 Q500,215 528,190" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <line x1="850" y1="120" x2="850" y2="190" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M822,190 Q850,215 878,190" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <line x1="1200" y1="120" x2="1200" y2="190" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M1172,190 Q1200,215 1228,190" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <line x1="1550" y1="120" x2="1550" y2="190" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <path d="M1522,190 Q1550,215 1578,190" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>

  <!-- Menu board on back wall -->
  <rect x="1170" y="145" width="160" height="110" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2.5"/>
  <line x1="1185" y1="168" x2="1315" y2="168" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="1185" y1="183" x2="1295" y2="183" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1185" y1="196" x2="1305" y2="196" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1185" y1="209" x2="1290" y2="209" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1185" y1="222" x2="1310" y2="222" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1185" y1="235" x2="1300" y2="235" stroke="#1a1a1a" stroke-width="1.5"/>
</svg>
