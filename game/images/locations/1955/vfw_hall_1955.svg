<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <rect width="1920" height="1080" fill="#F5F0E8"/>

  <!-- Room walls — low ceiling, utilitarian -->
  <line x1="100" y1="160" x2="1820" y2="160" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="160" x2="100" y2="860" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="1820" y1="160" x2="1820" y2="860" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="860" x2="1820" y2="860" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>

  <!-- Utilitarian ceiling — flat, low, no decoration -->
  <rect x="100" y="160" width="1720" height="80" fill="#EAE5D8" stroke="none"/>
  <!-- Ceiling boards suggestion -->
  <g stroke="#1a1a1a" stroke-width="0.8" opacity="0.3">
    <line x1="100" y1="190" x2="1820" y2="190"/>
    <line x1="100" y1="215" x2="1820" y2="215"/>
    <line x1="100" y1="235" x2="1820" y2="235"/>
  </g>

  <!-- FLOOR — plain, worn -->
  <g stroke="#1a1a1a" stroke-width="0.8" opacity="0.15">
    <line x1="100" y1="880" x2="1820" y2="880"/>
    <line x1="100" y1="905" x2="1820" y2="905"/>
    <line x1="100" y1="930" x2="1820" y2="930"/>
    <line x1="100" y1="955" x2="1820" y2="955"/>
    <line x1="100" y1="980" x2="1820" y2="980"/>
    <line x1="100" y1="1005" x2="1820" y2="1005"/>
    <line x1="100" y1="1030" x2="1820" y2="1030"/>
  </g>

  <!-- BAR COUNTER — left wall -->
  <!-- Bar top surface -->
  <rect x="100" y="500" width="450" height="360" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Bar face -->
  <rect x="100" y="590" width="450" height="270" fill="#BEB9A8" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Bar top edge -->
  <line x1="100" y1="500" x2="550" y2="500" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Bar rail -->
  <line x1="100" y1="558" x2="550" y2="558" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Foot rail near floor -->
  <line x1="100" y1="810" x2="550" y2="810" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Foot rail supports -->
  <line x1="180" y1="810" x2="180" y2="840" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="300" y1="810" x2="300" y2="840" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="420" y1="810" x2="420" y2="840" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Wooden panel decoration on bar front -->
  <rect x="115" y="600" width="80" height="200" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="215" y="600" width="80" height="200" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="315" y="600" width="80" height="200" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="415" y="600" width="80" height="200" rx="2" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- BAR STOOLS -->
  <g stroke="#1a1a1a" stroke-width="2">
    <!-- Stool 1 -->
    <circle cx="175" cy="850" r="30" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="175" y1="820" x2="175" y2="840" stroke-width="2.5"/>
    <line x1="155" y1="900" x2="160" y2="860" stroke-width="2"/>
    <line x1="195" y1="900" x2="190" y2="860" stroke-width="2"/>
    <!-- Stool 2 -->
    <circle cx="300" cy="850" r="30" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="300" y1="820" x2="300" y2="840" stroke-width="2.5"/>
    <line x1="280" y1="900" x2="285" y2="860" stroke-width="2"/>
    <line x1="320" y1="900" x2="315" y2="860" stroke-width="2"/>
    <!-- Stool 3 -->
    <circle cx="425" cy="850" r="30" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="425" y1="820" x2="425" y2="840" stroke-width="2.5"/>
    <line x1="405" y1="900" x2="410" y2="860" stroke-width="2"/>
    <line x1="445" y1="900" x2="440" y2="860" stroke-width="2"/>
  </g>

  <!-- Bottles on bar shelf behind counter -->
  <rect x="100" y="340" width="450" height="20" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Bottles -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="#C8C3B0">
    <rect x="120" y="280" width="20" height="58" rx="3"/>
    <path d="M120,280 Q130,265 140,280" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="150" y="285" width="16" height="53" rx="3"/>
    <path d="M150,285 Q158,272 166,285" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="176" y="278" width="22" height="60" rx="3"/>
    <path d="M176,278 Q187,263 198,278" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="210" y="283" width="18" height="55" rx="3"/>
    <path d="M210,283 Q219,270 228,283" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="240" y="280" width="20" height="58" rx="3"/>
    <path d="M240,280 Q250,265 260,280" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="272" y="288" width="15" height="50" rx="3"/>
    <path d="M272,288 Q280,278 287,288" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="298" y="275" width="24" height="63" rx="3"/>
    <path d="M298,275 Q310,258 322,275" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="334" y="282" width="18" height="56" rx="3"/>
    <path d="M334,282 Q343,270 352,282" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="362" y="278" width="20" height="60" rx="3"/>
    <path d="M362,278 Q372,263 382,278" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="394" y="285" width="16" height="53" rx="3"/>
    <path d="M394,285 Q402,272 410,285" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="420" y="280" width="22" height="58" rx="3"/>
    <path d="M420,280 Q431,265 442,280" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="456" y="283" width="18" height="55" rx="3"/>
    <path d="M456,283 Q465,270 474,283" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="486" y="278" width="20" height="60" rx="3"/>
    <path d="M486,278 Q496,263 506,278" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="518" y="285" width="14" height="53" rx="3"/>
  </g>
  <!-- Beer tap handles on bar -->
  <g stroke="#1a1a1a" stroke-width="2">
    <line x1="225" y1="500" x2="225" y2="468"/>
    <ellipse cx="225" cy="460" rx="12" ry="20" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="295" y1="500" x2="295" y2="468"/>
    <ellipse cx="295" cy="460" rx="12" ry="20" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="365" y1="500" x2="365" y2="468"/>
    <ellipse cx="365" cy="460" rx="12" ry="20" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="2"/>
  </g>

  <!-- WAR PHOTOGRAPHS — back wall, framed portraits -->
  <!-- Frame 1 -->
  <rect x="600" y="195" width="130" height="160" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="612" y="207" width="106" height="136" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Portrait suggestion — oval shape -->
  <ellipse cx="665" cy="264" rx="35" ry="45" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Uniform shoulder lines -->
  <path d="M632,307 Q665,320 698,307" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Frame 2 -->
  <rect x="780" y="185" width="130" height="160" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="792" y="197" width="106" height="136" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="845" cy="256" rx="35" ry="45" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M812,297 Q845,310 878,297" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Frame 3 (landscape, group photo) -->
  <rect x="960" y="195" width="220" height="150" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="972" y="207" width="196" height="126" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Group silhouettes -->
  <g fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1">
    <ellipse cx="1010" cy="250" rx="18" ry="22"/>
    <ellipse cx="1048" cy="253" rx="18" ry="22"/>
    <ellipse cx="1086" cy="248" rx="18" ry="22"/>
    <ellipse cx="1124" cy="252" rx="18" ry="22"/>
    <ellipse cx="1162" cy="249" rx="18" ry="22"/>
  </g>

  <!-- Frame 4 (portrait) -->
  <rect x="1230" y="195" width="130" height="160" fill="#EDE8DC" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="1242" y="207" width="106" height="136" fill="#D4CFC0" stroke="#1a1a1a" stroke-width="1.5"/>
  <ellipse cx="1295" cy="264" rx="35" ry="45" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M1262,307 Q1295,320 1328,307" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- TROPHY CASE / DISPLAY SHELF — right wall -->
  <rect x="1500" y="350" width="300" height="500" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="2.5" rx="2"/>
  <!-- Glass front (lighter) -->
  <rect x="1510" y="360" width="280" height="480" fill="#E8EEF0" stroke="#1a1a1a" stroke-width="1.5" opacity="0.6"/>
  <!-- Shelf dividers in case -->
  <line x1="1512" y1="480" x2="1788" y2="480" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="1512" y1="600" x2="1788" y2="600" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="1512" y1="720" x2="1788" y2="720" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Trophies on shelves -->
  <!-- Trophy 1 -->
  <g fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1.5">
    <rect x="1560" y="390" width="12" height="80"/>
    <path d="M1548,390 Q1566,370 1584,390" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="1550" y="462" width="32" height="10"/>
    <rect x="1555" y="472" width="22" height="6"/>
  </g>
  <!-- Trophy 2 -->
  <g fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1.5">
    <rect x="1660" y="385" width="14" height="88"/>
    <path d="M1645,385 Q1667,362 1689,385" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="1650" y="465" width="36" height="10"/>
    <rect x="1655" y="475" width="26" height="7"/>
  </g>
  <!-- Trophy 3 (cup style) -->
  <g fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1.5">
    <path d="M1730,430 Q1710,440 1710,468 Q1720,478 1750,478 Q1780,478 1790,468 Q1790,440 1770,430 Z" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="1700" y1="445" x2="1710" y2="455"/>
    <line x1="1800" y1="445" x2="1790" y2="455"/>
    <rect x="1735" y="478" width="30" height="8"/>
  </g>
  <!-- Plaque on 2nd shelf -->
  <rect x="1535" y="510" width="240" height="70" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1548" y1="530" x2="1762" y2="530" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="1548" y1="545" x2="1750" y2="545"/>
  <line x1="1548" y1="558" x2="1760" y2="558"/>

  <!-- ROUND TABLES with chairs -->
  <!-- Table 1 -->
  <ellipse cx="800" cy="700" rx="120" ry="80" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="800" cy="700" rx="110" ry="70" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Chairs around table 1 -->
  <rect x="680" y="660" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="870" y="660" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="750" y="788" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="750" y="570" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Beer glasses on table -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="#D8E8F0" opacity="0.7">
    <path d="M778,670 L783,704 L817,704 L822,670 Z"/>
    <path d="M840,665 L845,699 L879,699 L884,665 Z"/>
  </g>

  <!-- Table 2 -->
  <ellipse cx="1280" cy="700" rx="120" ry="80" fill="#C8C3B0" stroke="#1a1a1a" stroke-width="2.5"/>
  <ellipse cx="1280" cy="700" rx="110" ry="70" fill="none" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Chairs around table 2 -->
  <rect x="1160" y="660" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1350" y="660" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1230" y="788" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="1230" y="570" width="70" height="50" rx="5" fill="#C0BCAC" stroke="#1a1a1a" stroke-width="2"/>

  <!-- CLOCK on wall -->
  <circle cx="1650" cy="300" r="55" fill="#F5F0E8" stroke="#1a1a1a" stroke-width="3"/>
  <circle cx="1650" cy="300" r="48" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Clock numerals — tick marks -->
  <g stroke="#1a1a1a" stroke-width="2">
    <line x1="1650" y1="255" x2="1650" y2="265"/>
    <line x1="1650" y1="335" x2="1650" y2="345"/>
    <line x1="1695" y1="300" x2="1685" y2="300"/>
    <line x1="1605" y1="300" x2="1615" y2="300"/>
    <!-- Minor ticks -->
    <line x1="1672" y1="258" x2="1668" y2="264"/>
    <line x1="1690" y1="278" x2="1684" y2="280"/>
    <line x1="1690" y1="322" x2="1684" y2="320"/>
    <line x1="1672" y1="342" x2="1668" y2="336"/>
    <line x1="1628" y1="258" x2="1632" y2="264"/>
    <line x1="1610" y1="278" x2="1616" y2="280"/>
    <line x1="1610" y1="322" x2="1616" y2="320"/>
    <line x1="1628" y1="342" x2="1632" y2="336"/>
  </g>
  <!-- Clock hands -->
  <line x1="1650" y1="300" x2="1650" y2="265" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <line x1="1650" y1="300" x2="1678" y2="312" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="1650" cy="300" r="4" fill="#1a1a1a"/>

  <!-- OVERHEAD LIGHTS — simple pendant bulbs -->
  <g stroke="#1a1a1a" stroke-width="2" stroke-linecap="round">
    <line x1="600" y1="160" x2="600" y2="230"/>
    <path d="M582,230 Q600,250 618,230" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="1050" y1="160" x2="1050" y2="230"/>
    <path d="M1032,230 Q1050,250 1068,230" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>
    <line x1="1400" y1="160" x2="1400" y2="230"/>
    <path d="M1382,230 Q1400,250 1418,230" fill="#F0EBE0" stroke="#1a1a1a" stroke-width="2"/>
  </g>
</svg>
